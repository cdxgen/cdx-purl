name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }}, seed ${{ matrix.fuzz-seed }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - node-version: 20.x
            fuzz-seed: 1337
            typed-fuzz-seed: 4242
          - node-version: 22.x
            fuzz-seed: 7331
            typed-fuzz-seed: 9001
          - node-version: 24.x
            fuzz-seed: 2417
            typed-fuzz-seed: 9241
          - node-version: 25.x
            fuzz-seed: 2517
            typed-fuzz-seed: 9251

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run focused suites
        run: |
          pnpm test:base
          pnpm test:typed
          pnpm test:typed:all
          pnpm test:mutation
          pnpm test -- test/strict-encoding-edge-cases.test.js test/adversarial-type-policy.test.js

      - name: Run deterministic fuzz suites
        env:
          PURL_FUZZ_SEED: ${{ matrix.fuzz-seed }}
          PURL_TYPED_FUZZ_SEED: ${{ matrix.typed-fuzz-seed }}
          PURL_FUZZ_CASES: 300
          PURL_FUZZ_HOPS: 10
          PURL_FUZZ_MUTATION_CASES: 200
          PURL_TYPED_FUZZ_CASES: 240
          PURL_TYPED_FUZZ_HOPS: 8
        run: pnpm test:fuzz:ci

  bun:
    name: Bun Runtime Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0

      - name: Run Bun runtime smoke
        run: bun run test/runtime-smoke.mjs

  deno:
    name: Deno Runtime Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282  # v2.0.4
        with:
          deno-version: v2.x

      - name: Run Deno runtime smoke
        run: deno run --allow-read test/runtime-smoke.mjs

  provenance:
    name: Provenance And Signing Checks
    runs-on: ubuntu-latest
    needs:
      - test
      - bun
      - deno
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24.x
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check npm provenance publish path
        run: pnpm check:provenance

      - name: Check JSR publish dry-run
        if: ${{ hashFiles('jsr.json') != '' }}
        run: npx -y jsr publish --dry-run

  publish:
    name: Publish To npm
    runs-on: ubuntu-latest
    needs:
      - test
      - bun
      - deno
      - provenance
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish with provenance
        run: npm publish --provenance --access public

      - name: Publish to JSR
        if: ${{ hashFiles('jsr.json') != '' }}
        run: npx -y jsr publish

